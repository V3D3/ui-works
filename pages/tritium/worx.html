<html>
	<head>
		<title id='iiztitlek'>WORX // V3D3</title>
		<script src='../../scripts/jq.js'></script>
		<script src='../../scripts/jui.js'></script>
		<script src='../../scripts/vm.js'></script>
		<script src='../../scripts/vum.js'></script>
<!--		<script src='xpr.closure.js'></script>-->
		<meta name=viewport content='width=device-width, initial-scale=1'>
		<meta charset="utf-8" />
		<script>
			var sW = window.innerWidth, sH = window.innerHeight;
			var ninit = true;
			$(document).ready(function()  {
				$("#wxldc").velocity({fontSize: 0, top: "50%"}, 600, "easeInExpo", function()  {
					$("#wxld").delay(400).velocity({top: "50%", left: "50%", width: 2, height: 2}, 500, "easeOutExpo", function()  {
						$("#wxld").velocity({top: "100%"}, 400, "easeInExpo", function()  {
							mSwitchy();
							$("#wxld").delay(200).velocity({top: (sH / 2) - 1}, 600, "easeOutExpo", function()  {
								$('#wxld').css('overflow', 'visible');
								$("#wxld").velocity({left: 0, width: "100%"}, 700, "easeInOutExpo", function()  {
									$('.selb').css('background', '#ff2626').css('color', '#ff2626');
									$('#wxld').css('background', 'transparent');
									$('#sel1').velocity({opacity: 0.7});
									$('#sel2').velocity({opacity: 0.55});
									$('#sel3').velocity({opacity: 0.4});
									$('#sel0t, #sel1t, #sel2t, #sel3t').velocity({top: "-10vh", opacity: 1}, "easeOutExpo", function()  {
										bind();
									});
								});
							});
						});
					});
				});
			});
			
			function mSwitchy()  {
				$("#wxld").html("<span class='sel' id='sel0'><span class='selb'></span><span class='seltext' id='sel0t'>Programming</span><span class='selcv'></span></span>");
				$("#wxld").html($("#wxld").html() + "<span class='sel' id='sel1'><span class='selb'></span><span class='seltext' id='sel1t'>Writing</span><span class='selcv'></span></span>");
				$("#wxld").html($("#wxld").html() + "<span class='sel' id='sel2'><span class='selb'></span><span class='seltext' id='sel2t'>Photographic</span><span class='selcv'></span></span>");
				$("#wxld").html($("#wxld").html() + "<span class='sel' id='sel3'><span class='selb'></span><span class='seltext' id='sel3t'>Miscellaneous</span><span class='selcv'></span></span>");
				$('#sel0').css('left', 0);
				$('#sel1').css('left', '25%');
				$('#sel2').css('left', '50%');
				$('#sel3').css('left', '75%');
			}
			
			function bind()  {
				$(document).ready(function()  {
					$('#sel0').mouseenter(function()  {
						if(ninit)  {
							$("*").velocity('stop');
							$('#sel1t, #sel2t, #sel3t').velocity({top: '100%'}, 200, "easeInExpo");
							$('#sel1').velocity({opacity: 0.7}, 200);
							$('#sel2').velocity({opacity: 0.55}, 200);
							$('#sel3').velocity({opacity: 0.4}, 200);
							$('#sel0').velocity({opacity: 1}, 200);
							$('#sel0t').velocity({top: '-10vh'}, 200, 'easeOutExpo');
						}
					});
					$('#sel1').mouseenter(function()  {
						if(ninit)  {
							$("*").velocity('stop');
							$('#sel0t, #sel2t, #sel3t').velocity({top: '100%'}, 200, "easeInExpo");
							$('#sel0, #sel2').velocity({opacity: 0.7}, 200);
							$('#sel3').velocity({opacity: 0.55}, 200);
							$('#sel1').velocity({opacity: 1}, 200);
							$('#sel1t').velocity({top: '-10vh'}, 200, 'easeOutExpo');
						}
					});
					$('#sel2').mouseenter(function()  {
						if(ninit)  {
							$("*").velocity('stop');
							$('#sel1t, #sel0t, #sel3t').velocity({top: '100%'}, 200, "easeInExpo");
							$('#sel1, #sel3').velocity({opacity: 0.7}, 200);
							$('#sel0').velocity({opacity: 0.55}, 200);
							$('#sel2').velocity({opacity: 1}, 200);
							$('#sel2t').velocity({top: '-10vh'}, 200, 'easeOutExpo');
						}
					});
					$('#sel3').mouseenter(function()  {
						if(ninit)  {
							$("*").velocity('stop');
							$('#sel1t, #sel2t, #sel0t').velocity({top: '100%'}, 200, "easeInExpo");
							$('#sel2').velocity({opacity: 0.7}, 200);
							$('#sel1').velocity({opacity: 0.55}, 200);
							$('#sel0').velocity({opacity: 0.4}, 200);
							$('#sel3').velocity({opacity: 1}, 200);
							$('#sel3t').velocity({top: '-10vh'}, 200, 'easeOutExpo');
						}
					});
					$('#sel0').mouseleave(function()  {
						if(ninit)  {
							$("*").velocity('stop');
							$('#sel0t').velocity({backgroundColor: '#000000', color: '#ff2626'}, 200);
							$('#sel1t, #sel2t, #sel3t').velocity({top: '-10vh'}, 200, "easeOutExpo");
						}
					});
					$('#sel1').mouseleave(function()  {
						if(ninit)  {
							$("*").velocity('stop');
							$('#sel1t').velocity({backgroundColor: '#000000', color: '#ff2626'}, 200);
							$('#sel0t, #sel2t, #sel3t').velocity({top: '-10vh'}, 200, "easeOutExpo");
						}
					});
					$('#sel2').mouseleave(function()  {
						if(ninit)  {
							$("*").velocity('stop');
							$('#sel2t').velocity({backgroundColor: '#000000', color: '#ff2626'}, 200);
							$('#sel1t, #sel0t, #sel3t').velocity({top: '-10vh'}, 200, "easeOutExpo");
						}
					});
					$('#sel3').mouseleave(function()  {
						if(ninit)  {
							$("*").velocity('stop');
							$('#sel3t').velocity({backgroundColor: '#000000', color: '#ff2626'}, 200);
							$('#sel1t, #sel2t, #sel0t').velocity({top: '-10vh'}, 200, "easeOutExpo");
						}
					});
					$('#sel0, #sel1, #sel2, #sel3').mouseleave(function()  {
						if(ninit)  {
							$('#sel' + $(this).attr('id')[3] + 't').css('cursor', 'url("../..../../sprites/ff2626.svg"), default');
						}
					});
					$('.sel').mousedown(function()  {
						if(ninit)  {
							$('#sel' + $(this).attr('id')[3] + 't').delay(100).css('cursor', 'url("../..../../sprites/000000.svg"), default');
							$('#sel' + $(this).attr('id')[3] + 't').velocity('finish');
							$('#sel' + $(this).attr('id')[3] + 't').velocity({backgroundColor: '#ff2626', color: '#000000'}, 200);
						}
					});
					$('.sel').mouseup(function()  {
						if(ninit)  {
							ninit = false;
							var x = this;
							$(x).velocity('finish');
							$(x).css('z-index', 3);
							$(x).velocity({left: 0, width: '100%'}, 500, "easeInOutExpo", function()  {
								$('#wxld').velocity({top: '10%'}, 500, "easeInOutExpo", function()  {
									$('#iiztitlek').html(['PROG', 'WRIT', 'PICT', 'MISC'][+$(x).attr('id')[3]] + ' // WORX // V3D3');
								});
							});
						}
					});
				});
			}
			function kill()  {
				document.write("<html><head><title>Destroyed.</title></head><body style='background: black; overflow: hidden;'><p style='position: absolute; top: 0; left: 0; width: 100%; height: 50%; color: lime; font-family: monospace; font-size: 25vh; line-height: 50vh; margin: 0; text-align: center;'>Fatal Error.</p><p style='position: absolute; top: 50%; left: 0; width: 100%; height: 50%; color: lime; font-family: monospace; font-size: 5vh; line-height: 50vh; margin: 0; text-align: center;'>Page destroyed. Please report this to webmaster@v3d3.cf.</p></body></html>");
			}
		</script>
		<style>
			#wxld  {
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				font-family: "Segoe UI Light";
				font-size: 10vh;
				z-index: 90;
				background: #ff2626;
				overflow: hidden;
				cursor: url('../..../../sprites/ffffff.svg'), default;
			}
			#wxldc  {
				position: absolute;
				left: 0;
				width: 80%;
				padding-left: 10%;
				padding-right: 10%;
				text-align: center;
				font: inherit;
				color: white;
			}
			.sel  {
				position: absolute;
				height: 100%;
				width: 25%;
				top: 0;
			}
			.selb  {
				position: absolute;
				height: 100%;
				width: 100%;
				top: 0;
				z-index: 2;
			}
			.seltext  {
				position: absolute;
				width: 100%;
				height: 10vh;
				font-family: 'Segoe UI Light';
				font-size: 5vh;
				line-height: 10vh;
				text-align: center;
				color: #ff2626;
				opacity: 0;
				top: 100%;
				left: 0;
				z-index: 0;
				background: black;
			}
			.selcv  {
				position: absolute;
				z-index: 1;
				top: 100%;
				height: 10vh;
				left: 0;
				width: 100%;
				background: black;
			}
			*  {
				user-select: none;
				cursor: url('../..../../sprites/ff2626.svg'), default;
			}
		</style>
	</head>
	<body style='background: black; overflow: hidden; margin: 0;'>
		<span id='wxld'><span id='wxldc'>Oh, well, this is embarassing. I was supposed to be an awesome thought, but turns out, I didn't load correctly. The next page is loading, nevertheless.</span></span>
		<script>document.getElementById('wxldc').innerHTML = localStorage.getItem('qt');document.getElementById('wxldc').style.top = localStorage.getItem('qh');document.getElementById('wxldc').style.fontStyle = localStorage.getItem('ql');</script>
	</body>
</html>
