<html>
    <head>
        <title> Vertex Design Scheme // V3D3
        </title>
        <script src="../../scripts/jq.js"></script>
        <script src="../../scripts/jui.js"></script>
        <script src="../../scripts/vm.js"></script>
        <script src="../../scripts/vum.js"></script>
        <meta name=viewport content="width=device-width, initial-scale=1">
        <script>
            var sW = window.innerWidth;
            var sH = window.innerHeight;
            $(document).ready(function()  {
                $("#point").velocity({top: (sH / 2) - 2, left: (sW / 2) - 2, height: 0, width: 0}, 2500, "easeOutQuint", function()  {
                    $("#sp1").velocity({top: "50%", height: "50%"}, 2000, "easeOutExpo");
                    $("#sp2").delay(500).velocity({top: "0", height: "50%"}, 2000, "easeOutExpo");
                    $("#sp3").delay(1000).velocity({top: "0", height: "50%"}, 2000, "easeOutExpo");
                });
            });
        </script>
        <style>
            span  {
                position: absolute;
            }
        </style>
    </head>
    <body style="background-color: black; overflow: hidden; margin: 0px;">
        <span style="overflow: visible; background-color: black; margin: 0; transform: translateY(-7.737%); top: 0; left: 0; height: 100%; width: 100%;">
            <span style="top: 7.737%; height: 84.526%; width: 2px; left: calc(50% - 1px); overflow: visible;">
                <span id="sp1" style="top: -50%; width: 100%; left: 0; height: 2px; background: linear-gradient(to bottom, orange, black);">
                </span>
            </span>
            <span style="width: 2px; height: 115.473%; left: 50%; transform: rotate(-60deg); top: -7.737%; overflow: visible;">
                <span id="sp2" style="top: 150%; left: 0; width: 100%; height: 2px; background: linear-gradient(to top, orange, black);">
                </span>
            </span>
            <span style="width: 2px; height: 115.473%; left: 50%; transform: rotate(60deg); top: -7.737%; overflow: visible;">
                <span id="sp3" style="top: 150%; left: 0; height: 2px; width: 2px; background: linear-gradient(to top, orange, black);">
                </span>
            </span>
            <span id="point" style="height: 150vw; width: 150%; border-radius: 50%; border: 2px solid orange; top: calc(50% - 75vw); left: -25%;"></span>
        </span>
    </body>
</html>
