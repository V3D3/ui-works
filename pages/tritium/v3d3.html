			$(document).ready(function()  {
				$('#wxldc').delay(100).velocity({textShadowBlur: '20px', fontSize: '11vh'}, "easeInOutExpo", function()  {
					$('#wxldc').delay(200).velocity({top: '100%'}, "easeInQuint", function()  {
						$('.sel, .selx').css('display', 'block');
						$('.sel').delay(200).velocity({boxShadowBlur: '40px', scale: 1.1}, 600, 'easeInOutExpo', function()  {
							$('#wxld').velocity({top: '100%'}, 600, "easeInQuint", function()  {
								$('.sel').velocity({top: '44.5%'}, 600, 'easeInOutExpo');
								$('#sel0').velocity({left: (sW / 4) - (sH * 0.055)}, 600, 'easeInOutExpo');
								$('#sel2').velocity({left: (sW * 0.75) - (sH * 0.055)}, 600, 'easeInOutExpo', function()  {
									$('.seltext').css('display', 'block');
									$('.sel').velocity({scale: 0.91}, 600, 'easeInOutExpo');
									$('#sel0t, #sel1t, #sel2t').velocity({translateX: -(sH * 0.0166)}, 0);
									$('.seltext').velocity({top: sH * 0.62}, 600, 'easeInOutExpo', function()  {
										$('#sel0t, #sel1t, #sel2t').velocity({width: '8%', translateX: -((sW * 0.04) + (sH * 0.0166))}, 400, 'easeInOutExpo', function()  {
											bind();
										});
									});
								});
							});
						});
					});
				});
			});
			
			function bind()  {
				$(document).ready(function()  {
					$('.sel').mouseenter(function()  {
						if(ninit == 1)  {
							$(this).velocity('stop');
							$('#' + $(this).attr('id') + 't').velocity('stop');
							$(this).velocity({scale: 1.1}, 400, 'easeInOutExpo');
							$('#' + $(this).attr('id') + 't').velocity({translateX: -(sH * 0.0166), top: sH * 0.4395, width: '1.68vh'}, 400, 'easeInOutExpo');
						}
					});
					$('.sel').mouseleave(function()  {
						if(ninit == 1)  {
							$(this).velocity('stop');
							$('#' + $(this).attr('id') + 't').velocity('stop');
							$(this).velocity({scale: 0.91}, 400, 'easeInOutExpo');
							$('#' + $(this).attr('id') + 't').velocity({translateX: -((sW * 0.04) + (sH * 0.0166)), top: sH * 0.62, width: '8%'}, 400, 'easeInOutExpo');
						}
					});
					$('.sel').mousedown(function()  {
						if(ninit == 1)  {
							ninit = 0;
							$('.sel').css('z-index', -1);
							$(this).css('z-index', 2);
							$(this).velocity({top: (sH / 2) - sW, left: -(sW / 2), width: sW * 2, height: sW * 2}, 400, 'easeInExpo', function()  {
								f = $(this).attr('id')[3];
								$('body').css('background', '#1e90ff');
								$('body').css('cursor', 'url("../..../../sprites/000000.svg"), default');
								$('.sel, .seltext, #wxld').remove(); //unnecessary?
								cbuild();
							});
						}  else  {
							kill();
						}
					});
				});
			}
			function kill()  {
				document.write("<html><head><title>Destroyed.</title></head><body style='background: black; overflow: hidden;'><p style='position: absolute; top: 0; left: 0; width: 100%; height: 50%; color: lime; font-family: monospace; font-size: 25vh; line-height: 50vh; margin: 0; text-align: center;'>Fatal Error.</p><p style='position: absolute; top: 50%; left: 0; width: 100%; height: 50%; color: lime; font-family: monospace; font-size: 5vh; line-height: 50vh; margin: 0; text-align: center;'>Page destroyed. Please report this to webmaster@v3d3.cf.</p></body></html>");
			}
			function cbuild()  {
				$('#menuhl').css('display', 'block');
				$('body').css('background', '#000000').css('cursor', 'url("../..../../sprites/1e90ff.svg"), default');
				$('#ps' + f).css('background', '#1e90ff').css('cursor', 'url("../..../../sprites/000000.svg"), default').css('color', 'black');
				$('#panel' + f).css('display', 'block');
				$('#menu, #menuhl').velocity({right: 0}, 600, 'easeOutExpo', function()  { //another.
					$('#menu').delay(300).velocity({right: "100vw"}, 400, 'easeInExpo', function()  {
						$('#menuhl').delay(300).velocity({right: "99.5vw"}, 400, 'easeInOutExpo', function()  {
							ninit = 2;
						});
					});
				});
			}
			$(document).ready(function()  {
				$('#menuhl').mouseenter(function()  {
					if(ninit == 2)  {
						$(this).velocity({right: '99vw'}, 100);
					}
				});
				$('#menuhl').mouseleave(function()  {
					if(ninit == 2)  {
						$(this).velocity({right: '99.5vw'}, 100);
					}
				});
				$('#menuhl').mousedown(function()  {
					if(ninit == 2)  {
						$(this).velocity({right: '0vw'}, 600, "easeOutExpo", function()  {
							$('#menu').velocity({right: '0vw'}, 600, "easeOutExpo");
						});
					}
				});
			});
