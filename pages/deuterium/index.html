        <script>
            var sH = window.innerHeight;
            var sW = window.innerWidth;
            var mob = false;
            var no = false;
            if(sH > sW)  {
                mob = true;
            }

			$(document).ready(function()  {
                $("#imarobot").mouseenter(function()  {
                    if(!no)  {$("#imarobot").css("background-color", "orange").css("color", "black");}
                });
                $("#imarobot").mouseup(function()  {
                    if(!no)  {doit();}
                });
                $("#imarobot").mouseleave(function()  {
                    if(!no)  {$("#imarobot").css("background-color", "black").css("color", "orange");}
                });
                $("#imarobot").mousedown(function()  {
                    if(!no) {$("#imarobot").css("background-color", "black").css("color", "orange");}
                });
            });

            function doit()  {
                no = true;
                $(document).ready(function()  {
                    var i = 0;
                    function cinBlur() {
                        $("#everything").css("webkitFilter", "blur(" + i + "px)");
                        $("#everything").css("filter", "blur(" + i++ + "px)");
                        if(i < 40){
                            setTimeout(cinBlur, 60);
                        }
                        else  {
                            $("#everything").animate({opacity: 0}, 1500, function()  {
                                document.location = "donotread.html";
                            });
                        }
                    }
                    cinBlur();
                });
            }
        </script>
