<html>
    <head>
        <title>V3D3 // LOGO</title>
        <style>
            @keyframes rot_0_360  {
                from  {
                    transform: rotate(0deg);
                }
                to  {
                    transform: rotate(360deg);
                }
            }
            @keyframes rot_360_0  {
                from  {
                    transform: rotate(360deg);
                }
                to  {
                    transform: rotate(0deg);
                }
            }
            span  {
                position: absolute;
            }
        </style>
        <script src='../../scripts/jq.js'></script>
    </head>
    <body style='background: black; margin: 0; overflow: hidden;'>
        <span id='s100' style='top: calc(50% - 12.5vh - 2px); left: calc(50% - 12.5vh - 2px); height: 25vh; width: 25vh; background: black; border-radius: 50%; z-index: 100; border: 2px solid orange; box-shadow: 0 0 50px rgba(255, 165, 0, 0.4);'></span>
    </body>
    <script>

        var sW = window.innerWidth, sH = window.innerHeight;
        $(document).ready(function()  {

            for(var i = 0; i < 25; i++)  {
                var el = '<span style="border-radius: 50%; animation-iteration-count: infinite; animation-timing-function: linear;';
                var t1 = gR(20, 31);
                var t2 = gR(20, 31);
                el += ' height: ' + t1 + 'vh;';
                el += ' width: ' + t2 + 'vh;';
                el += ' top: calc(50% - ' + (t1 / 2) + 'vh);';
                el += ' left: calc(50% - ' + (t2 / 2) + 'vh);';
                el += ' box-shadow: inset 0 0 ' + gR(50, 100) + 'px rgba(255, 165, 0, 0.5);';
                el += ' transform: rotate(' + gR(0, 360) + 'deg);';
                el += ' animation-duration: ' + gR(8, 13) + 's;';
                el += ' animation-name: ' + (gR(0, 1)?'rot_0_360':'rot_360_0') + ';'
                $('body').append(el + '"></span>');
            }

        });

        function gR(x, y)  {
            return Math.round(x + (y - x) * Math.random());
        }

        console.log('<3 JS. <3 CSS.')
    </script>
</html>
