<html>
	<head>
		<title>TRITIUM (closed) - Razorview Logo</title>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<script src="../../scripts/jq.js"></script>
		<script src="../../scripts/vm.js"></script>
		<script src="../../scripts/vum.js"></script>
		<script>
			$(document).ready(function()  {
				$('#p2, #p1, #p0').velocity({translateY: '100vh', scaleX: 0.1, scaleY: 0.1}, 0);
				$('#p2').velocity({translateY: '-35vh', scaleX: 1, scaleY: 1}, 800, 'easeOutExpo');
				$('#p1').delay(200).velocity({translateY: '-10vh', scaleX: 1, scaleY: 1}, 800, 'easeOutExpo');
				$('#p0').delay(400).velocity({translateY: '15vh', scaleX: 1, scaleY: 1}, 800, 'easeOutExpo', function()  {
					$("#p2").delay(500).velocity({top: '5vh', translateY: 0}, 800, "easeInOutCirc");
					$("#p1").delay(500).velocity({rotateZ: 120, top: '5vh', translateY: 0}, 800, "easeInOutCirc");
					$("#p0").delay(500).velocity({rotateZ: -120, top: '5vh', translateY: 0}, 800, "easeInOutCirc");
				});
			});
		</script>
	</head>
	<body style="background: black; margin: 0; overflow: hidden;">
		<!--TRITIUMX2V1 (SCALABLE)-->
			<span id='p2' style='position:absolute;top:20%;left:0;height:100%;width:100%;z-index:2;transform:translateY(100vh)'>
				<span id='neu2' style="position: absolute; top: 25.86%; left: calc(50% - 10vh); width: 20vh; height: 20vh; border: 2px solid white; border-radius: 50% 50% 0 50%; box-shadow: 0 0 50px white; transform: rotate(45deg);">
				</span>
			</span>
			<span id='p1' style='position:absolute;top:20%;left:0;height:100%;width:100%;z-index:0;transform:translateY(100vh)'>
				<span id='neu1' style="position: absolute; top: 25.86%; left: calc(50% - 10vh); width: 20vh; height: 20vh; border: 2px solid orange; border-radius: 50% 50% 0 50%; box-shadow: 0 0 50px orange; transform: rotate(45deg);">
				</span>
			</span>
			<span id='p0' style='position:absolute;top:20%;left:0;height:100%;width:100%;z-index:1;transform:translateY(100vh)'>
				<span id='neu0' style="position: absolute; top: 25.86%; left: calc(50% - 10vh); width: 20vh; height: 20vh; border: 2px solid dodgerblue; border-radius: 50% 50% 0 50%; box-shadow: 0 0 50px dodgerblue; transform: rotate(45deg);">
				</span>
			</span>
	</body>
</html>
