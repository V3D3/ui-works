<script>
    var sW = window.innerWidth, sH = window.innerHeight;
    var sel = "tTab";
    var tvISel = -1;
    var mnk = true;
    $(document).ready(function()  {
        render();
        $("#movieTab, #youtubeTab, #tvTab").velocity({transformPerspective: 600}, 0);
    });
    $(document).ready(function()  {
        $(".tabb").mouseenter(function()  {
            var id = $(this).attr("id");
            var c = Number($("#" + sel).css("left").slice(0, -2));
            var d = Number($("#" + id).css("left").slice(0, -2));
            var w = Number($("#" + sel).css("width").slice(0, -2));
            if(c > d)  {
                $("#slcN").velocity({left: d, width: (c - d) + w}, 200, "easeInOutExpo");
            }  else  {
                $("#slcN").velocity({width: (d - c) + w}, 200, "easeInOutExpo");
            }
        });
        $(".tabb").mouseleave(function()  {
            var c = Number($("#" + sel).css("left").slice(0, -2));
            var w = Number($("#" + sel).css("width").slice(0, -2));
            $("#slcN").velocity({left: c, width: w}, 200, "easeInOutExpo");
        });
        $(".tabb").mousedown(function()  {
            sel = $(this).attr("id");
            var c = Number($("#" + sel).css("left").slice(0, -2));
            var w = Number($("#" + sel).css("width").slice(0, -2));
            $("#slcN").velocity({left: c, width: w}, 200, "easeInOutExpo");
            var col = "";
            if(sel == "mTab")  {
                col = "#ffff00";
            }  else if(sel == "tTab")  {
                col = "#1e90ff";
            }  else  {
                col = "#ff0000";
            }
            $(".tabb").velocity({color: col}, 400);
            $("#slcN").velocity({backgroundColor: col}, 400);
            twerk();
        });
        $(".tvItem").mouseenter(function()  {
            if(mnk)  {
                $("*").velocity("stop");
                tvISel = $(this).attr("id").split("Item")[1];
                $("#itEmulH").html($("#tvItemHead" + tvISel).html());
                $("#itEmulF").html($("#tvItemFoot" + tvISel).html());
                var lft = Number($(this).css("left").slice(0, -2)) - $("#tvTab").scrollLeft();
                while(lft > sW)  {
                    lft -= sW;
                }
                $("#itEmul").css({left: lft, top: getProp("tv", tvISel, "top") + 0.1 * sH, width: $(this).css("width"), height: $(this).css("height")});
                $(".tvItem").velocity({blur: 5}, 250);
            }
        });
        $("#itEmul").mouseleave(function()  {
            if(mnk)  {
                $("*").velocity("stop");
                $(".tvItem").velocity({blur: 0}, 250, function()  {
                    $("#itEmul").css({height: 0, width: 0, left: 0, top: 0});
                });
            }
        });
        $("#itEmul").mousedown(function()  {
            if(mnk)  {
                mnk = false;
                $(".tvItem").velocity({blur: 10}, 500, function()  {
                    load(tvISel - 1);
                });
            }
        });
    });

    function twerk()  {
        $(document).ready(function()  {
            if(sel == "tTab")  {
                $("#movieTab").velocity({transformPerspective: 600, left: "-200%", opacity: 0.5, rotateY: -45}, "easeInExpo");
                $("#youtubeTab").velocity({transformPerspective: 600, left: "200%", opacity: 0.5, rotateY: 45}, "easeInExpo", function()  {
                    $("#tvTab").velocity({transformPerspective: 600, left: 0, opacity: 1, rotateY: 0}, "easeOutExpo", function()  {
                    });
                    $("#movieTab, #youtubeTab").css("z-index", "-1");
                    $("#tvTab").css("z-index", "0");
                });
            }  else if(sel == "mTab")  {
                $("#tvTab, #youtubeTab").velocity({transformPerspective: 600, left: "200%", opacity: 0.5, rotateY: 45}, "easeInExpo", function()  {
                    $("#movieTab").velocity({transformPerspective: 600, left: 0, opacity: 1, rotateY: 0}, "easeOutExpo", function()  {
                    });
                    $("#tvTab, #youtubeTab").css("z-index", "-1");
                    $("#movieTab").css("z-index", "0");
                });
            }  else  {
                $("#tvTab, #movieTab").velocity({transformPerspective: 600, left: "-200%", opacity: 0.5, rotateY: -45}, "easeInExpo", function()  {
                    $("#youtubeTab").velocity({transformPerspective: 600, left: 0, opacity: 1, rotateY: 0}, "easeOutExpo", function()  {
                    });
                    $("#movieTab, #tvTab").css("z-index", "-1");
                    $("#youtubeTab").css("z-index", "0");
                });
            }
        });
    }

    function render()  {
        var itms = 1;
        for(var i = 0; i < sAr.length; i++)  {
            addHtm("tv", "<span class='tvItem' id='tvItem" + itms + "'><span class='tvItemHead' id='tvItemHead" + itms + "'>" + sAr[i] + "</span><span class='tvItemFoot' id='tvItemFoot" + itms + "'></span>");
            var itml = [];
            var num = [];
            for(var j = 0; j < eAr[i].length; j++)  {
                var tp = eAr[i][j].split(" ")[0];
                if(itml.indexOf(tp) == -1)  {
                    itml.push(tp);
                    num.push(1);
                }  else  {
                    num[itml.indexOf(tp)]++;
                }
            }
            var str = num[0] + " " + itml[0] + "(s)";
            for(var j = 1; j < itml.length; j++)  {
                str += ", " + num[j] + " " + itml[j] + "(s)";
            }
            $("#tvItemFoot" + itms).html(str);
            if(i < 3)  {
                if(i == 0)  {
                    $("#tvItem" + itms).css({top: "6.5%", left: "5%"});
                }  else if(i == 1)  {
                    $("#tvItem" + itms).css({top: "37.5%", left: "5%"});
                }  else  {
                    $("#tvItem" + itms).css({top: "68.5%", left: "5%"});
                }
            }  else  {
                if(i % 3 == 0)  {
                    $("#tvItem" + itms).css({top: "6.5%"});
                }  else if(i % 3 == 1)  {
                    $("#tvItem" + itms).css({top: "37.5%"});
                }  else  {
                    $("#tvItem" + itms).css({top: "68.5%"});
                }
                $("#tvItem" + itms).css({left: getProp("tv", itms - 3, "left") + (0.08 * sW) + getProp("tv", itms - 3, "width")});
            }
            if(i == sAr.length - 1)  {
                addHtm("tv", "<span style='position: absolute; width: 8%; height: 100%; top: 0; left: " + (getProp("tv", itms, "left") + getProp("tv", itms, "width")) + "px;'></span>")
            }
            itms++;
        }
    }
    function addHtm(it, mu)  {
        $("#" + it + "Tab").html($("#" + it + "Tab").html() + mu);
    }
    function getProp(it, nm, pr)  {
        return Number($("#" + it + "Item" + nm).css(pr).slice(0, -2));
    }

        $("#itEmulF").velocity({lineHeight: "20vh", height: "100%", fontSize: "5vh"}, "easeInOutExpo");

                    $("#itImg").css("z-index", 1).css("opacity", "1");
                    $("#itEmulC").velocity({boxShadowBlur: "100px"}, function()  {
                        $("#itImg").velocity({top: (0.05 * sH)}, "easeInOutExpo", function()  {
                            $("#itEmulC").velocity({boxShadowBlur: "0px"}, function()  {
                                $("#itHdr").css({top: 0, height: "40%"});
                                $("#itEmulF").css({top: 0, height: 0});

                                $("#itDet").html(dAr[x]);

                                $("#itGen").delay(400).velocity({left: "30%"}, "easeInOutExpo", 1000, function()  {

                                });
                            });
                        });
                    });
                });
            });
        });
    }
    function tvLoadCont(x)  {
        var actAr = eAr[x];
        var avaAr = aAr[x];
        var s = "";
        for(var i = 0; i < actAr.length; i++)  {

            s += ", #itCntE" + i;
        }
        $(s.substring(2)).velocity("transition.flipXIn", {stagger: 100});
        $("#itImg").css("z-index", "5");
        $("#itHdr").css("z-index", "3");
        $("#itHdr").velocity({boxShadowBlur: "10px"}, function()  {
            $("#itEmulAcB").velocity({height: "10%", bottom: 0}, "easeInOutExpo");
        });
    }
    function stCnv(x)  {
        switch(Number(x))  {
            case 0:
                return "Unavailable";
            case 1:
                return "Downloading";
            case 2:
                return "Downloaded";
            case 3:
                return "Watching";
            case 4:
                return "Watched";
        }
    }
