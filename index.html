<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>worx ui | gallery</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <style>
        :root {
            --primary: #ff9d00;
            --primary-glow: rgba(255, 157, 0, 0.3);
            --bg: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.1);
            --text: #e0e0e0;
            --font-main: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 40px;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 40px auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 20px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 200;
            letter-spacing: -1px;
            color: var(--primary);
            text-transform: lowercase;
            line-height: 1;
        }

        .header-meta {
            font-size: 0.9rem;
            color: #666;
            text-align: right;
            max-width: 300px;
        }

        .search-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin-top: 20px;
        }

        #search-input {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 12px 20px;
            border-radius: 12px;
            color: var(--primary);
            font-family: var(--font-main);
            font-size: 1rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            outline: none;
        }

        #search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        #search-input::placeholder {
            color: #444;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            grid-auto-flow: dense;
            gap: 24px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .tile {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 200px;
            text-align: center;
            backdrop-filter: blur(10px);
            grid-column: span var(--span, 1);
        }

        .tile:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            background: rgba(255, 157, 0, 0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px var(--primary);
        }

        .shine-effect::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 150%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.05),
                rgba(255, 255, 255, 0.15),
                rgba(255, 255, 255, 0.05),
                transparent
            );
            transform: skewX(-20deg);
            animation: shine 1.5s ease-in-out;
            pointer-events: none;
        }

        @keyframes shine {
            0% { left: -150%; }
            100% { left: 150%; }
        }

        /* Group Styling */
        .tile-group {
            position: relative;
        }

        .tile-group::before,
        .tile-group::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            z-index: -1;
            transition: transform 0.3s cubic-bezier(0.165, 0.84, 0.44, 1), opacity 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .tile-group::before {
            transform: translate(6px, 6px);
            opacity: 0.6;
        }

        .tile-group::after {
            transform: translate(12px, 12px);
            opacity: 0.3;
        }

        .tile-group:hover::before {
            transform: translate(10px, 10px);
            opacity: 0.8;
        }

        .tile-group:hover::after {
            transform: translate(20px, 20px);
            opacity: 0.5;
        }

        .tile::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, var(--primary-glow), transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .tile:hover::before {
            opacity: 1;
        }

        .tile-type {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
            margin-bottom: 8px;
            transition: color 0.3s ease;
        }

        .tile:hover .tile-type {
            color: var(--primary);
        }

        .tile-name {
            font-size: 1.4rem;
            font-weight: 300;
            color: var(--text);
            transition: color 0.3s ease;
        }

        .tile:hover .tile-name {
            color: #fff;
        }

        .tile-desc {
            font-size: 0.85rem;
            color: #888;
            margin-top: 10px;
            font-weight: 300;
            line-height: 1.4;
            max-width: 80%;
            transition: color 0.3s ease;
        }

        .tile:hover .tile-desc {
            color: #ccc;
        }

        /* Viewer Overlay */
        #viewer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: none;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(20px);
        }

        #viewer-header {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid var(--card-border);
        }

        #viewer-title {
            color: var(--primary);
            font-weight: 300;
            font-size: 1.2rem;
        }

        #close-btn {
            background: none;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 6px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--font-main);
            transition: all 0.3s ease;
        }

        #close-btn:hover {
            background: var(--primary);
            color: black;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        /* Loading Indicator */
        .loading-spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 157, 0, 0.1);
            border-top-color: var(--primary);
            border-bottom-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
            margin-right: 15px;
            flex-shrink: 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #viewer-frame {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #111;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
    </style>
</head>
<body>
    <header>
        <div class="header-top">
            <h1>worx ui</h1>
            <div class="header-meta">
                Visual works by Vedaant.
            </div>
        </div>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="search experiments..." autocomplete="off">
        </div>
    </header>

    <main class="gallery" id="tile-container">
        <!-- Tiles injected here -->
    </main>

    <div id="viewer-overlay">
        <div id="viewer-header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <span id="viewer-title">experiment</span>
                <div id="loading-indicator" class="loading-spinner"></div>
            </div>
            <button id="close-btn">close</button>
        </div>
        <iframe id="viewer-frame" src=""></iframe>
    </div>

    <script>
        let projects = [];
        let currentProjects = [];
        let navigationStack = [];
        const container = document.getElementById('tile-container');
        const searchInput = document.getElementById('search-input');
        const overlay = document.getElementById('viewer-overlay');
        const frame = document.getElementById('viewer-frame');
        const viewerTitle = document.getElementById('viewer-title');
        const closeBtn = document.getElementById('close-btn');
        const loadingIndicator = document.getElementById('loading-indicator');

        async function init() {
            try {
                const response = await fetch('tiles.json');
                if (!response.ok) throw new Error('Failed to load tiles.json');
                projects = await response.json();
                currentProjects = projects;
                createTiles(currentProjects);
            } catch (error) {
                console.error('Error loading tiles:', error);
                container.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 60px; color: #666; font-weight: 300;">
                        <div style="font-size: 1.2rem; margin-bottom: 20px; color: var(--primary);">unable to load experiments</div>
                        <p style="font-size: 0.9rem; opacity: 0.8;">
                            This usually happens when viewed via the <code>file://</code> protocol.<br>
                            Please run a local server (e.g., <code>npx serve</code>) to view the gallery.
                        </p>
                    </div>
                `;
            }
        }

        function createTiles(items, filter = '') {
            container.innerHTML = '';

            // Add back button if in a group
            if (navigationStack.length > 0) {
                const backTile = document.createElement('div');
                backTile.className = 'tile';
                backTile.innerHTML = `
                    <div class="tile-type">Navigation</div>
                    <div class="tile-name">← Back</div>
                `;
                backTile.onclick = goBack;
                container.appendChild(backTile);
            }

            items.forEach(project => {
                const searchStr = `${project.title} ${project.type || ''} ${project.description || ''}`.toLowerCase();
                if (searchStr.includes(filter.toLowerCase())) {
                    const tile = document.createElement('div');
                    tile.className = 'tile' + (project.entry_type === 'group' ? ' tile-group' : '');
                    tile.style.setProperty('--span', project.weight || 2);

                    tile.innerHTML = `
                        <div class="tile-type">${project.type || (project.entry_type === 'group' ? 'Group' : 'Misc')}</div>
                        <div class="tile-name">${project.title}</div>
                        ${project.entry_type === 'group' && project.description ? `<div class="tile-desc">${project.description}</div>` : ''}
                    `;

                    if (project.description) {
                        tile.title = project.description;
                    }

                    if (project.entry_type === 'group') {
                        tile.onclick = () => enterGroup(project);
                    } else {
                        tile.onclick = () => openViewer(project.title, project.path);
                    }
                    container.appendChild(tile);
                }
            });
        }

        function enterGroup(group) {
            navigationStack.push(currentProjects);
            currentProjects = group.entries || [];
            createTiles(currentProjects);
            searchInput.value = '';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goBack() {
            if (navigationStack.length > 0) {
                currentProjects = navigationStack.pop();
                createTiles(currentProjects);
                searchInput.value = '';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function openViewer(name, path) {
            viewerTitle.textContent = name.toLowerCase();
            loadingIndicator.style.display = 'block';
            frame.src = path;
            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.style.opacity = '1';
            }, 10);
            document.body.style.overflow = 'hidden';
        }

        frame.onload = () => {
            loadingIndicator.style.display = 'none';

            // Try to detect navigation within the frame if same-origin
            try {
                if (frame.contentWindow) {
                    frame.contentWindow.addEventListener('unload', () => {
                        loadingIndicator.style.display = 'block';
                    });
                }
            } catch (e) {
                // Cross-origin restriction - can't detect internal navigation start
            }
        };

        function closeViewer() {
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                frame.src = '';
            }, 300);
            document.body.style.overflow = 'auto';
        }

        searchInput.oninput = (e) => createTiles(currentProjects, e.target.value);
        closeBtn.onclick = closeViewer;

        function triggerRandomShine() {
            const tiles = document.querySelectorAll('.tile');
            if (tiles.length > 0) {
                const randomTile = tiles[Math.floor(Math.random() * tiles.length)];
                randomTile.classList.add('shine-effect');
                setTimeout(() => {
                    randomTile.classList.remove('shine-effect');
                }, 2000);
            }

            const nextDelay = Math.floor(Math.random() * 2000) + 5000; // 5-7s
            setTimeout(triggerRandomShine, nextDelay);
        }

        // Escape to close
        window.onkeydown = (e) => {
            if (e.key === 'Escape' && overlay.style.display === 'flex') {
                closeViewer();
            }
        };

        // Initialize
        init().then(() => {
            setTimeout(triggerRandomShine, 5000); // Start after 5s
        });
    </script>
</body>
</html>
