        <script>
            var sH = window.innerHeight;
            var sW = window.innerWidth;
            var mob = false;

            var thingy = '“Screw the world. Make it happen.”';
            if(sH > sW)  {

            }
            function cinInt()  {
                $("#twt_standard").css("top", (sH / 2) - ($("#twt_standard").height() / 2));
                $("#twt_standardx").css("top", (sH / 2) - ($("#twt_standard").height() / 2));
                $("#twt_inverted").css("top", (sH / 2) - ($("#twt_inverted").height() / 2));
                $("#twt_main").css("top", (sH / 2) - ($("#twt_main").height() / 2));
                $("#front").velocity({height: 0}, 1500, "easeInExpo", function()  {
                    $("#front").css("z-index", "1").css("height", "100%");
                    $("#mid").velocity({height: 0}, 600, function()  {
                        $("body").css("backgroundColor", "black");
                        $("#front").velocity({height: 0}, 1500, "easeOutExpo", function()  {
                            $("#twt_inverted").velocity({left: "100%"}, 800, "easeInExpo", function()  {
                                $("#twt_main").velocity({left: "0%"}, 800, "easeOutExpo", function()  {
                                    $("#twt_main").velocity({fontSize: "22px", top: 9}, 700, "easeInExpo", function()  {
                                        $("#back").velocity({height: "50px", width: "150px", top: 0, left: (sW / 2) - 75}, 700, "easeOutExpo");
                                    });
                                });
                            });
                        });
                    });
                });
            }
